<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Location LIFF</title>

<!-- ✅ LIFF SDK -->
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<style>
body {
    font-family: sans-serif;
    background-color: #fdfae7;
    margin: 20px;
    text-align: center;
}

.outer-box {
    border: 2px solid #555;
    border-radius: 20px;
    padding: 20px;
}

.map-box {
    height: 200px;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 10px;
}

button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #06C755;
    color: white;
    font-size: 16px;
    width: 100%;
    margin-top: 10px;
}
</style>
</head>

<body>

<h2>เลือก Location 📍</h2>

<div class="outer-box">

    <!-- สมุทรสาคร -->
    <div>
        <div class="map-box">
            <iframe src="https://www.google.com/maps?q=13.516803,100.297749&z=14&output=embed"
            width="100%" height="100%" style="border:0;"></iframe>
        </div>
        <button onclick="sendLocation('สมุทรสาคร')">เลือกสมุทรสาคร</button>
    </div>

    <!-- สมุทรปราการ -->
    <div>
        <div class="map-box">
            <iframe src="https://www.google.com/maps?q=13.599096,100.599831&z=14&output=embed"
            width="100%" height="100%" style="border:0;"></iframe>
        </div>
        <button onclick="sendLocation('สมุทรปราการ')">เลือกสมุทรปราการ</button>
    </div>

</div>

<script>
const LIFF_ID = "YOUR_LIFF_ID"; // 🔥 ใส่ของคุณตรงนี้

async function main() {
    await liff.init({ liffId: 2009962426-MPtoZcTX });

    if (!liff.isLoggedIn()) {
        liff.login();
    }
}

main();

// ✅ ส่งข้อความกลับแชต
function sendLocation(place) {
    liff.sendMessages([
        {
            type: "text",
            text: "ฉันเลือก: " + place
        }
    ]).then(() => {
        liff.closeWindow(); // ปิดหน้า LIFF
    });
}
</script>

</body>
</html>
